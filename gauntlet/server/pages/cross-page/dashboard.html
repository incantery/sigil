<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gauntlet · cross-page · dashboard</title>
  <style>
    body { font: 16px system-ui, sans-serif; margin: 2rem; }
    p { margin: .6rem 0; }
  </style>
</head>
<body>
  <main>
    <h1>Dashboard</h1>
    <!-- Each line is rendered as a single text node so the direct-text
         matcher sees the whole phrase ("Signed in as …", "Account …")
         on one element. -->
    <p id="who"></p>
    <p id="acctline"></p>
  </main>
  <script>
    const q = new URLSearchParams(location.search);
    document.getElementById('who').textContent =
      'Signed in as ' + (q.get('u') || '');
    document.getElementById('acctline').textContent =
      'Account ' + (q.get('acct') || '');
  </script>
</body>
</html>
