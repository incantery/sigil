<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gauntlet · cross-page · sign in</title>
  <style>
    body { font: 16px system-ui, sans-serif; margin: 2rem; }
    button, input { font: inherit; padding: .4rem .6rem; }
    p { margin: .6rem 0; }
  </style>
</head>
<body>
  <main>
    <h1>Sign in</h1>
    <!-- The account number is page-owned. A robust test reads it here
         rather than hard-coding it, then asserts it survives to the next
         page. -->
    <p>Account <strong id="acct">4815</strong></p>
    <input id="email" placeholder="Email">
    <button id="signin">Sign in</button>
  </main>
  <script>
    // Clicking Sign in performs a real full-page navigation, passing the
    // account + email along in the query — the page tears its document
    // down, which is exactly what destroys a naive injected test bundle.
    document.getElementById('signin').addEventListener('click', () => {
      const acct = document.getElementById('acct').textContent.trim();
      const email = document.getElementById('email').value;
      location.assign('/c/cross-page/dashboard?acct=' +
        encodeURIComponent(acct) + '&u=' + encodeURIComponent(email));
    });
  </script>
</body>
</html>
