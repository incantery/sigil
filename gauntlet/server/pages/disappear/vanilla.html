<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gauntlet · disappear · vanilla</title>
  <style>
    body { font: 16px system-ui, sans-serif; margin: 2rem; }
    button { font: inherit; padding: .4rem .9rem; }
    #status { margin-top: 1rem; min-height: 1.5em; }
  </style>
</head>
<body>
  <main>
    <h1>Disappearance under async</h1>
    <!-- Keep the literal indicator strings OUT of isolated prose elements:
         the direct-text matcher would treat them as permanent matches. -->
    <p>Clicking <em>Save</em> shows a transient progress indicator that is
       replaced by a confirmation after a delay — no Sigil on this page.</p>
    <button id="save">Save</button>
    <!-- "Saving…" lives here for ~400ms, then becomes "Saved". A test
         that asserts the indicator is gone must wait it out; a one-shot
         read right after the click sees it present and false-fails. -->
    <div id="status"></div>
  </main>
  <script>
    document.getElementById('save').addEventListener('click', () => {
      const s = document.getElementById('status');
      s.textContent = 'Saving…';
      setTimeout(() => { s.textContent = 'Saved'; }, 400);
    });
  </script>
</body>
</html>
